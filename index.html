    <div class="hero-content">
      <div class="content-wrapper">

  <div class="badge" data-aos="fade-up">
    <i class="fas fa-sparkles"></i> Programação para Web</div>

      <h1 class="hero-title" data-aos="fade-up" data-aos-delay="100">Dashboard <span class="highlight">Acadêmico</span></h1>

            <div class="neon-line"></div>

        <p class="hero-description">Desempenho do Semestre</p>
          </div>
           </section>
           

    <section class="section-panel section-panel--combined" id="sectionTransition">
      <div class="transition-bg"></div>
      <div class="panel-content">
        <div class="transition-content">
          <img class="title-graph-svg" src="./assets/svg/grafico-de-linha.svg" alt="" aria-hidden="true">
          <h2 class="transition-title">Grafico de Linha</h2>
          <div class="transition-line"></div>
          <p class="transition-subtitle">Evolucao da Nota por Bimestre</p>
        </div>
        <div class="chart-frame">
          <canvas id="graficoNotas"></canvas>
        </div>
      </div>
    </section>

    <section class="section-panel section-panel--combined" id="secaoTituloFrequencia">
      <div class="transition-bg"></div>
      <div class="panel-content">
        <div class="transition-content">
          <h2 class="transition-title">Grafico de Barras</h2>
          <div class="transition-line"></div>
          <p class="transition-subtitle">Frequencia por Disciplina (%)</p>
        </div>
        <div class="chart-frame">
          <canvas id="graficoFrequencia"></canvas>
        </div>
      </div>
    </section>

    <section class="section-panel section-panel--combined" id="secaoTituloTempo">
      <div class="transition-bg"></div>
      <div class="panel-content">
        <div class="transition-content">
          <h2 class="transition-title">Grafico de Pizza</h2>
          <div class="transition-line"></div>
          <p class="transition-subtitle">Distribuicao de Tempo de Estudo</p>
        </div>
        <div class="chart-frame">
          <canvas id="graficoTempo"></canvas>
        </div>
      </div>
    </section>
