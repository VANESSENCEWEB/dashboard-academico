<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Acadêmico</title>

  <!-- SEO -->
  <meta name="description" content="Dashboard acadêmico interativo com gráficos de evolução de notas, frequência por disciplina e distribuição de tempo de estudo. Desenvolvido com Chart.js.">
  <meta name="keywords" content="dashboard acadêmico, chartjs, gráficos, notas, frequência, programação web">
  <meta name="author" content="Vanessa">

  <!-- Open Graph (WhatsApp, Facebook, LinkedIn, Discord) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dashboard Acadêmico">
  <meta property="og:description" content="Visualização interativa de desempenho acadêmico — notas, frequência e tempo de estudo por disciplina.">
  <meta property="og:image" content="https://vanessenceweb.github.io/dashboard-academico/assets/img/screenshot-homepage.avif">
  <meta property="og:url" content="https://vanessenceweb.github.io/dashboard-academico">
  <meta property="og:locale" content="pt_BR">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dashboard Acadêmico">
  <meta name="twitter:description" content="Visualização interativa de desempenho acadêmico — notas, frequência e tempo de estudo por disciplina.">
  <meta name="twitter:image" content="https://vanessenceweb.github.io/dashboard-academico/assets/img/screenshot-homepage.avif">

  <link rel="stylesheet" href="style.css">

  <!-- FAVICON -->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
  <link rel="android-chrome-icon" sizes="192x192" href="./assets/favicon/android-chrome-192x192.png">
  <link rel="android-chrome-icon" sizes="512x512" href="./assets/favicon/android-chrome-512x512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/favicon/site.webmanifest">


  <!-- GOOGLE FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

</head>
<body>
  <section class="hero">



    <div class="hero-content">
      <div class="content-wrapper">

  <div class="badge" data-aos="fade-up">
    <i class="fas fa-sparkles"></i> Programação para Web</div>

      <h1 class="hero-title" data-aos="fade-up" data-aos-delay="100">Dashboard <span class="highlight">Acadêmico</span></h1>

            <div class="neon-line"></div>

        <p class="hero-description">Desempenho do Semestre</p>
          </div>
           </section>
           

    <section class="section-panel section-panel--combined" id="sectionTransition">
      <div class="transition-bg"></div>
      <div class="panel-content">
        <div class="transition-content">
          <h2 class="transition-title">Gráfico de Linha</h2>
          <div class="transition-line"></div>
          <p class="transition-subtitle">Evolução da Nota por Bimestre</p>
        </div>
        <div class="chart-frame">
          <canvas id="graficoNotas"></canvas>
        </div>
      </div>
    </section>

    <section class="section-panel section-panel--combined" id="secaoTituloFrequencia">
      <div class="transition-bg"></div>
      <div class="panel-content">
        <div class="transition-content">
          <h2 class="transition-title">Gráfico de Barras</h2>
          <div class="transition-line"></div>
          <p class="transition-subtitle">Frequência por Disciplina (%)</p>
        </div>
        <div class="chart-frame">
          <canvas id="graficoFrequencia"></canvas>
        </div>
      </div>
    </section>

    <section class="section-panel section-panel--combined" id="secaoTituloTempo">
      <div class="transition-bg"></div>
      <div class="panel-content">
        <div class="transition-content">
          <h2 class="transition-title">Gráfico de Pizza</h2>
          <div class="transition-line"></div>
          <p class="transition-subtitle">Distribuição de Tempo de Estudo</p>
        </div>
        <div class="chart-frame">
          <canvas id="graficoTempo"></canvas>
        </div>
      </div>
    </section>

  

       


 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

</body>
</html>
